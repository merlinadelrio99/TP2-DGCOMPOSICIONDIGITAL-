<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAPA</title>
    <link rel="icon" href="IMG/MAPA_FAVICON.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./CSS/checkout2.css">

</head>

<body>
    <main>

        <section>
            <article class="tarjeta">
                <h2><strong>MEDIOS DE PAGOS</strong></h2>

                <h3>TARJETA</h3>
                <p>
                <div class="form">
                    Número de tarjeta:
                    <input type="text">
                </div>
                </p>
                <p>
                <div class="form">
                    Vencimiento:
                    <input type="text" placeholder="MM/AA">
                </div>
                </p>

                <p>
                <div class="form">
                    CVV:
                    <input type="text">
                </div>
                </p>


                <h3>EFECTIVO</h3>
                <div class="form">
                    Se abona al retirar el día de la feria
                </div>

                <h3>MERCADO PAGO</h3>
                <div class="form">
                    Llega por mail el link para abonar
                </div>

                <button onclick="location.href='store.html'">VOLVER A TIENDA</button>

                <a href="checkout3.html">
                    <button>CONFIRMAR PAGO</button>
                </a>

            </article>
        </section>

    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

       <button id="btnSubir">
    <svg xmlns="http://www.w3.org/2000/svg"
         width="22"
         height="22"
         fill="white"
         viewBox="0 0 16 16">
        <path fill-rule="evenodd"
              d="M8 12a.5.5 0 0 1-.5-.5V5.707L5.354 7.854a.5.5 0 1 1-.708-.708l3-3a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 5.707V11.5A.5.5 0 0 1 8 12"/>
    </svg>
</button>   

    <script>
    const boton = document.getElementById("btnSubir");

    window.onscroll = function() {
        if (document.documentElement.scrollTop > 300) {
            boton.style.display = "flex";
        } else {
            boton.style.display = "none";
        }
    };

    boton.onclick = function() {
        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    };
</script>

</body>
