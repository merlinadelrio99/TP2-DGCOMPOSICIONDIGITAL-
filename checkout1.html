<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAPA</title>
    <link rel="icon" href="IMG/MAPA_FAVICON.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./CSS/checkout1.css">
   

</head>

<body>
    <main>
        <section>
            <article class="tarjeta">
                <h2><strong>DATOS PERSONALES</strong></h2>


                <p>
                <div class="form">
                    Nombre:
                    <input placeholder="Nombre y Apellido" type="text" name="Usuario">
                </div>
                </p>

                <p>
                <div class="form">
                    Correo electrónico:
                    <input type="email" placeholder="ejemplo@gmail.com" name="Mail">
                </div>
                </p>
                <p>
                <div class="form">
                    Dirección:
                    <input type="text" placeholder="Calle" name="Calle">
                    <input type="number" placeholder="Altura" name="Altura">
                    <input type="text" placeholder="Localidad" name="Localidad">
                    <input type="number" placeholder="Código Postal" name="Código Postal">
                </div>
                </p>

                <button onclick="location.href='store.html'">VOLVER A TIENDA</button>

                <button onclick="location.href='checkout2.html'">CONTINUAR</button>

            </article>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
