<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAPA</title>
    <link rel="icon" href="IMG/MAPA_FAVICON.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./CSS/checkout1.css">


</head>

<body>
    <main>
        <section>
            <article class="tarjeta">
                <h2><strong>DATOS PERSONALES</strong></h2>


                <p>
                <div class="form">
                    Nombre:
                    <input placeholder="Nombre y Apellido" type="text" name="Usuario">
                </div>
                </p>

                <p>
                <div class="form">
                    Correo electrónico:
                    <input type="email" placeholder="ejemplo@gmail.com" name="Mail">
                </div>
                </p>
                <p>
                <div class="form">
                    Dirección:
                    <input type="text" placeholder="Calle" name="Calle">
                    <input type="number" placeholder="Altura" name="Altura">
                    <input type="text" placeholder="Localidad" name="Localidad">
                    <input type="number" placeholder="Código Postal" name="Código Postal">
                </div>
                </p>

                <button onclick="location.href='store.html'">VOLVER A TIENDA</button>

                <button onclick="location.href='checkout2.html'">CONTINUAR</button>

            </article>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <button id="btnSubir">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 16 16">
            <path fill-rule="evenodd"
                d="M8 12a.5.5 0 0 1-.5-.5V5.707L5.354 7.854a.5.5 0 1 1-.708-.708l3-3a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 5.707V11.5A.5.5 0 0 1 8 12" />
        </svg>
    </button>

    <script>
        const boton = document.getElementById("btnSubir");

        window.onscroll = function () {
            if (document.documentElement.scrollTop > 300) {
                boton.style.display = "flex";
            } else {
                boton.style.display = "none";
            }
        };

        boton.onclick = function () {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        };
    </script>


</body>
